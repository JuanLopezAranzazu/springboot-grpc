syntax = "proto3";

package test;

option java_multiple_files = true;
option java_package = "com.juanlopezaranzazu.grpc";
option java_outer_classname = "TestProto";

service TestService {
  rpc Ping (PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
}
